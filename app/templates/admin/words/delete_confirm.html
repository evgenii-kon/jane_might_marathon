{% extends "admin/base.html" %}

{% block content %}
<h2>🗑️ Удаление слова</h2>

<p>Вы уверены, что хотите удалить слово <strong>{{ word.hanzi }} ({{ word.translation }})</strong>?</p>
<p style="color: red;">⚠️ Это действие необратимо!</p>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit">✅ Да, удалить</button>
    <a href="/admin/words">Отмена</a>
</form>
{% endblock %}
