{% extends "admin/base.html" %}

{% block content %}
<h2>👥 Пользователи</h2>
<p><a href="/admin/users/create">➕ Создать пользователя</a></p>

<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Email</th>
            <th>Telegram</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.telegram or '-' }}</td>
            <td>
                <a href="/admin/users/{{ user.id }}/edit">✏️</a>
                <a href="/admin/users/{{ user.id }}/delete" onclick="return confirm('Удалить {{ user.name }}?')">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
