{% extends "admin/base.html" %}

{% block content %}
<h2>{% if user %}✏️ Редактирование пользователя{% else %}➕ Новый пользователь{% endif %}</h2>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <p>
        <label>Имя:</label><br>
        <input type="text" name="name" value="{{ user.name if user else '' }}" required>
    </p>
    <p>
        <label>Email:</label><br>
        <input type="email" name="email" value="{{ user.email if user else '' }}" required>
    </p>
    <p>
        <label>Telegram:</label><br>
        <input type="text" name="telegram" value="{{ user.telegram if user else '' }}">
    </p>
    <p>
        <label>Пароль:</label><br>
        <input type="password" name="password" {% if not user %}required{% endif %}>
        {% if user %}<small>(оставьте пустым, чтобы не менять)</small>{% endif %}
    </p>
    <p>
        <button type="submit">💾 Сохранить</button>
        <a href="/admin/users">Отмена</a>
    </p>
</form>
{% endblock %}
