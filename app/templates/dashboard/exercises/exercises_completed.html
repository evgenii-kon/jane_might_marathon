{% extends "base.html" %}

{% block title %}Упражнения завершены! - {{ lesson.name }}{% endblock %}

{% block content %}
<div class="completed-container">
    <div class="completed-card">
        <div class="completed-icon">🎉</div>
        
        <h1>Поздравляем!</h1>
        
        <p class="completed-message">
            Вы успешно прошли все упражнения урока <strong>{{ lesson.name }}</strong>.
        </p>
        
        <div class="completed-actions">
            <a href="/dashboard" class="btn-primary">
                🏠 На главную
            </a>
            <a href="/dashboard/weeks/{{ lesson.week_id }}" class="btn-secondary">
                📚 К списку уроков
            </a>
            </a>
        </div>
    </div>
</div>
{% endblock %}
